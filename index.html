<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Форма регистрации</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h1>Регистрация</h1>

        <form id="registerForm">

            <input
                type="text"
                id="name"
                placeholder="Введите имя"
            >

            <input
                type="email"
                id="email"
                placeholder="Введите email"
            >

            <button type="submit">
                Отправить форму
            </button>

        </form>

        <p id="message"></p>
    </div>

    <script src="script.js"></script>

</body>
</html>
