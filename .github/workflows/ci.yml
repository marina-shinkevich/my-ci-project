name: CI Tests

on:
  push:
    branches:
      - main
      - dev
      - 'fix/**'

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Check Chrome
        run: google-chrome --version || true

      - name: Run tests
        run: node tests/form.test.js